name: Build Wear OS APK (Debug)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-wear:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Wear OS debug APK
        run: gradle :wear:assembleDebug

      - name: Submit dependency graph
        uses: gradle/actions/submit-dependency-graph@v4

      - name: Upload Wear OS APK artifact
        uses: actions/upload-artifact@v4.6.1
        with:
          name: PixelPlay-wear-only-debug
          path: wear/build/outputs/apk/debug/*.apk
